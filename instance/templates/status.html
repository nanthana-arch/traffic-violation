<!DOCTYPE html>
<html>

<head>
    <title>Violation Status</title>
</head>

<body>

    <h2>Violation Status</h2>

    <p><b>Vehicle Number:</b> {{ record.vehicle_number }}</p>
    <p><b>Violation:</b> {{ record.violation_type }}</p>
    <p><b>Location:</b> {{ record.location }}</p>
    <p><b>Date:</b> {{ record.date }}</p>
    <p><b>Fine:</b> {{ record.fine }}</p>
    <p><b>Status:</b> {{ record.status }}</p>

</body>

</html>

</html>
